services:
  - type: web
    name: pippf-backend
    runtime: python
    rootDir: phishing_backend/backend
    buildCommand: pip install -r requirements.txt && python manage.py migrate
    startCommand: gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ENABLE_CSRF
        value: "True"
      - key: DJANGO_CORS_ALLOW_ALL_ORIGINS
        value: "False"