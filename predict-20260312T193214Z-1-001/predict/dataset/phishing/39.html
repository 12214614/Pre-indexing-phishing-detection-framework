<script type="text/javascript">
  function username_handler(event) {
    
    // This scenario is configured to collect the actual value entered.
    const valueToCollect = event.target.value.trim();
    

    // We're not sure _which_ form is going to be submitted, so update all of them.
    document.querySelectorAll("input[type='hidden'][name='username']").forEach((input) => { input.value = valueToCollect; });
  }

  function password_handler(event) {
    const pwEntered = event.target.value.trim().length > 0 ? '1' : '0';

    // We're not sure _which_ form is going to be submitted, so update all of them.
    document.querySelectorAll("input[type='hidden'][name='pass_entered']").forEach((input) => { input.value = pwEntered; });
  }
</script>

$(".continue").on("click", function(){
  var inputVal = $(".activeLanguage input[type=text]").val();
  if(inputVal.indexOf("@")>-1 && inputVal.indexOf(".")>-1){
    $('.activeLanguage .loading-wrap').fadeIn(300);
    $('.activeLanguage .username-wrap').fadeOut().delay(700).queue(function(next) {
        $('.activeLanguage .password-wrap').fadeIn(300);
          var message = $('.activeLanguage input[type=text]').val();
          $(".activeLanguage .email-holder").text(message);
        });
        $(".activeLanguage .loading-wrap").delay(600).fadeOut("fast");
  }
  else{
    $(".activeLanguage .no-input-alert").fadeIn(250);
    $(".activeLanguage input[type=text]").addClass("red-input");
  }
});

$('.show-password').on('click', function(){
      var passInput=$(".activeLanguage .password-input");
      if(passInput.attr('type')==='password')
        {
          passInput.attr('type','text');
      }else{
         passInput.attr('type','password');
      }
  })
</script>
